name: Render ProChain Ad

on:
  workflow_dispatch:
  push:
    branches:
      - claude/prochain-tiktok-ad-P9a5L

permissions:
  contents: write

concurrency:
  group: render-prochain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Chromium + Arabic fonts + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libnss3 libdbus-1-3 libatk1.0-0 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 \
            libxdamage1 libgbm1 libatk-bridge2.0-0 \
            libpango-1.0-0 libcairo2 libcups2 \
            fonts-noto-core fonts-noto || \
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-noto
          which ffmpeg && ffmpeg -version | head -1

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure Remotion Chrome Headless Shell
        run: npx remotion browser ensure || true

      - name: Ensure background music exists
        run: |
          set -x
          mkdir -p public
          if [ ! -f public/music.mp3 ]; then
            echo "== generating 45s silent MP3 with ffmpeg =="
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo \
              -t 45 -q:a 9 -acodec libmp3lame public/music.mp3
          else
            echo "== public/music.mp3 already present =="
          fi
          ls -lh public/music.mp3
          file public/music.mp3

      - name: Render video
        run: |
          set -x
          rm -f out.mp4
          npx remotion render ProChainAd out.mp4 \
            --concurrency=2 \
            --log=verbose \
            --timeout=60000
          ls -lh out.mp4
          file out.mp4

      - name: Commit rendered MP4
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out.mp4
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Render ProChain ad MP4 [skip ci]"
            git push
          fi
