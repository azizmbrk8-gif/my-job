name: Render ProChain Ad

on:
  workflow_dispatch:
  push:
    branches:
      - claude/prochain-tiktok-ad-P9a5L

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libdbus-1-3 libatk1.0-0 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 \
            libxdamage1 libgbm1 libatk-bridge2.0-0 \
            libpango-1.0-0 libcairo2 libcups2

      - name: Install npm dependencies
        run: npm ci

      - name: Render video
        run: npx remotion render ProChainAd out.mp4 --log=info

      - name: Commit rendered MP4
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out.mp4
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Render ProChain ad MP4 [skip ci]"
            git push
          fi
